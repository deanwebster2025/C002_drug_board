name: Deploy Drug Board

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build public board artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force public | Out-Null
          Copy-Item board.html public/index.html
          Copy-Item board.html public/board.html
          Copy-Item index.html public/editorial.html
          Copy-Item app.js, styles.css -Destination public
          Copy-Item assets public/assets -Recurse
          Copy-Item data public/data -Recurse
          New-Item -ItemType File public/.nojekyll -Force | Out-Null

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
